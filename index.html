<script>
    const BASE_URL = 'https://api.eia.gov/v2/natural-gas/pri/fut/data/';
    const API_KEY = 'BRUFz1Ow7Qmcd2npz5UNQhrF4ILujETSWc5L3mBC';

    async function fetchData() {
        const frequency = document.getElementById('frequency').value;

        const url = `${BASE_URL}?api_key=${API_KEY}&frequency=${frequency}&data[0]=value&sort[0][column]=period&sort[0][direction]=desc&offset=0&length=5000`;

        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`Error fetching data: ${response.statusText}`);
            }

            const data = await response.json();
            populateTable(data.response.data);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function populateTable(data) {
        const tableBody = document.getElementById('data-table').querySelector('tbody');
        tableBody.innerHTML = '';

        data.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.period}</td>
                <td>${item.value}</td>
            `;
            tableBody.appendChild(row);
        });
    }

    // Fetch data on page load
    fetchData();

    // Re-fetch when dropdown changes
    document.getElementById('frequency').addEventListener('change', fetchData);
</script>
